                            }
                            icon={DollarSign}
                            color="bg-emerald-500"
                        />
                        <StatCard
                            title="Avg Age"
                            value={stats.avgAge}
                            icon={Clock}
                            color="bg-purple-500"
                        />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {stats.deptData.length > 0 && (
                            <Card>
                                <h3 className="font-bold text-slate-800 mb-4">
                                    Attrition by Department
                                </h3>
                                <div className="h-64">
                                    <ResponsiveContainer>
                                        <BarChart data={stats.deptData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                            <XAxis
                                                dataKey="name"
                                                fontSize={10}
                                                angle={-15}
                                                textAnchor="end"
                                            />
                                            <YAxis />
                                            <Tooltip />
                                            <Bar
                                                dataKey="attrition"
                                                fill="#EF4444"
                                                radius={[4, 4, 0, 0]}
                                            />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </Card>
                        )}

                        {stats.incomeGap !== null && (
                            <Card className="border-l-4 border-l-orange-400">
                                <h3 className="font-bold text-slate-800 mb-2">Income Impact</h3>
                                <p className="text-sm text-slate-500 mb-4">
                                    Do leavers earn less than stayers?
                                </p>
                                <div>
                                    <p className="text-xs uppercase font-bold text-slate-400">
                                        Monthly Gap
                                    </p>
                                    <h2
                                        className={`text-2xl font-bold ${stats.incomeGap > 0 ? 'text-green-600' : 'text-red-600'
                                            }`}
                                    >
                                        {stats.incomeGap > 0 ? '+' : '-'}$
                                        {Math.abs(stats.incomeGap).toLocaleString()}
                                    </h2>
                                    <p className="text-xs text-slate-500 mt-1">
                                        {stats.incomeGap > 0
                                            ? 'Leavers tend to earn less.'
                                            : 'Leavers tend to earn more.'}
                                    </p>
                                </div>
                            </Card>
                        )}

                        {stats.ageData.length > 0 && (
                            <Card>
                                <h3 className="font-bold text-slate-800 mb-4">Attrition by Age</h3>
                                <div className="h-64">
                                    <ResponsiveContainer>
                                        <BarChart data={stats.ageData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                            <XAxis dataKey="name" />
                                            <YAxis />
                                            <Tooltip />
                                            <Bar
                                                dataKey="attrition"
                                                fill="#8884d8"
                                                radius={[4, 4, 0, 0]}
                                            />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </Card>
                        )}

                        {stats.educationData.length > 0 && (
                            <Card>
                                <h3 className="font-bold text-slate-800 mb-4">
                                    Attrition by Education
                                </h3>
                                <div className="h-64">
                                    <ResponsiveContainer>
                                        <BarChart data={stats.educationData} layout="vertical">
                                            <CartesianGrid strokeDasharray="3 3" horizontal={false} />
                                            <XAxis type="number" hide />
                                            <YAxis
                                                dataKey="name"
                                                type="category"
                                                width={90}
                                                fontSize={10}
                                            />
                                            <Tooltip />
                                            <Bar
                                                dataKey="attrition"
                                                fill="#F59E0B"
                                                radius={[0, 4, 4, 0]}
                                            />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </Card>
                        )}

                        {stats.satisfactionData.length > 0 && (
                            <Card>
                                <h3 className="font-bold text-slate-800 mb-4">Job Satisfaction</h3>
                                <div className="h-64">
                                    <ResponsiveContainer>
                                        <PieChart>
                                            <Pie
                                                data={stats.satisfactionData}
                                                innerRadius={60}
                                                outerRadius={80}
                                                dataKey="value"
                                            >
                                                {stats.satisfactionData.map((e, i) => (
                                                    <Cell key={i} fill={e.color} />
                                                ))}
                                            </Pie>
                                            <Tooltip />
                                            <Legend />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            </Card>
                        )}
                    </div>

                    <div className="text-xs text-slate-400 mt-4 p-4 border-t border-slate-200">
                        <h4 className="font-bold mb-2">Debug Info (Column Mapping)</h4>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                            {Object.entries(stats.columnMapping || {}).map(([k, v]) => (
                                <div key={k}>
                                    {k}:{' '}
                                    <span className={v ? 'text-green-600' : 'text-red-400'}>
                                        {v || 'Not Found'}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const PredictView = ({ uploadedData = [] }) => {
            const [formData, setFormData] = useState({
                Age: '',
                BusinessTravel: 'Travel_Rarely',
                DailyRate: '',
                Department: 'Sales',
                EnvironmentSatisfaction: 3,
                JobSatisfaction: 2,
                OverTime: 'Yes',
                MonthlyIncome: 5000,
                TotalWorkingYears: 8,
                YearsAtCompany: 2,
            });
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [selectedEmpIndex, setSelectedEmpIndex] = useState('');

            const handleSelectEmployee = (e) => {
                const idx = e.target.value;
                setSelectedEmpIndex(idx);

                if (idx === '' || !uploadedData[idx]) return;

                const emp = uploadedData[idx];
                const newForm = { ...formData };

                // Map CSV columns to Form Fields
                // Helper to find value by synonym
                const getVal = (key) => {
                    const foundKey = findKey(emp, key);
                    return foundKey ? emp[foundKey] : '';
                };

                // Auto-fill fields (basic mapping)
                const fields = Object.keys(formData);
                fields.forEach(f => {
                    const val = getVal(f);
                    if (val) newForm[f] = val;
                });

                setFormData(newForm);
            };

            // Dynamic Departments from Uploaded Data
            const departments = useMemo(() => {
                const defaults = ['Sales', 'Research & Development', 'Human Resources'];
                if (!uploadedData || uploadedData.length === 0) return defaults;

                const deptKey = findKey(uploadedData[0], 'Department');
                if (!deptKey) return defaults;

                const distinct = new Set(defaults);
                uploadedData.forEach(row => {
                    if (row[deptKey]) distinct.add(row[deptKey].trim());
                });
                return Array.from(distinct).sort();
            }, [uploadedData]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData((prev) => ({
                    ...prev,
                    [name]: value,
                }));
            };

            const setVal = (name, val) => {
                setFormData((prev) => ({
                    ...prev,
                    [name]: val,
                }));
            };

            const simulatePrediction = async () => {
                setLoading(true);
                setResult(null);

                try {
                    const response = await fetch('http://127.0.0.1:5000/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData),
                    });

                    if (!response.ok) {
                        throw new Error(`API responded with status ${response.status}`);
                    }

                    const data = await response.json();
                    setResult({
                        prediction: data.prediction,
                        probability: data.probability,
                        factors: [
                            formData.OverTime === 'Yes'
                                ? 'High Impact: OverTime is Yes'
                                : null,
                            parseInt(formData.MonthlyIncome, 10) < 3500
                                ? 'High Impact: Low Income'
                                : null,
                        ].filter(Boolean),
                    });
                } catch (error) {
                    console.error('API Error', error);
                    setTimeout(() => {
                        let score = 0;
                        if (formData.OverTime === 'Yes') score += 30;
                        if (parseInt(formData.MonthlyIncome, 10) < 4000) score += 20;
                        let prob = 10 + score;
                        if (prob > 95) prob = 95;
                        setResult({
                            prediction: prob > 50 ? 'Yes' : 'No',
                            probability: prob,
                            factors: ['Demo Mode (API not reachable)'],
                        });
                    }, 400);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="ml-0 md:ml-64 p-6 md:p-8 animate-fade-in relative z-0">
                    <div className="mb-6">
                        <h2 className="text-2xl font-bold text-slate-800">
                            Employee Attrition Prediction
                        </h2>
                        <p className="text-slate-500 text-sm">
                            Use the form below or select an employee from your uploaded file to predict attrition probability.
                        </p>
                    </div>

                    {uploadedData.length > 0 && (
                        <div className="mb-8 bg-white p-4 rounded-xl border border-blue-100 shadow-sm flex items-center gap-4">
                            <div className="bg-blue-50 p-2 rounded-lg text-blue-600">
                                <Users size={20} />
                            </div>
                            <div className="flex-1">
                                <label className="block text-sm font-bold text-slate-700 mb-1">
                                    Auto-fill from Uploaded File
                                </label>
                                <select
                                    className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                                    value={selectedEmpIndex}
                                    onChange={handleSelectEmployee}
                                >
                                    <option value="">-- Select an Employee --</option>
                                    {uploadedData.slice(0, 100).map((emp, i) => (
                                        <option key={i} value={i}>
                                            #{i + 1} - {findKey(emp, 'JobRole') ? emp[findKey(emp, 'JobRole')] : 'Employee'}
                                            ({findKey(emp, 'Department') ? emp[findKey(emp, 'Department')] : 'Unknown Dept'})
                                        </option>
                                    ))}
                                </select>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <Card className="lg:col-span-2 border-2 border-indigo-100/50 shadow-lg">
                            <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <User size={20} /> Employee Details
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        Age
                                    </label>
                                    <input
                                        type="number"
                                        name="Age"
                                        value={formData.Age}
                                        onChange={handleChange}
                                        className="w-full p-3 bg-slate-100 border-0 rounded-lg focus:ring-2 focus:ring-indigo-500 transition-all"
                                        min="18"
                                        max="70"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        Department
                                    </label>
                                    <select
                                        name="Department"
                                        value={formData.Department}
                                        onChange={handleChange}
                                        className="w-full p-3 bg-slate-100 border-0 rounded-lg focus:ring-2 focus:ring-indigo-500 transition-all"
                                    >
                                        {departments.map(dept => (
                                            <option key={dept} value={dept}>{dept}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        Distance From Home (km)
                                    </label>
                                    <input
                                        type="range"
                                        min="1"
                                        max="50"
                                        name="DistanceFromHome"
                                        value={formData.DistanceFromHome}
                                        onChange={handleChange}
                                        className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                    />
                                    <div className="flex justify-between text-xs text-slate-400 mt-1">
                                        <span>1 km</span>
                                        <span>{formData.DistanceFromHome} km</span>
                                        <span>50 km</span>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        OverTime
                                    </label>
                                    <div className="flex gap-2">
                                        <button
                                            type="button"
                                            onClick={() => setVal('OverTime', 'Yes')}
                                            className={`flex-1 py-2 rounded-lg font-bold transition-all ${formData.OverTime === 'Yes'
                                                ? 'bg-red-100 text-red-600 border border-red-200'
                                                : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                                }`}
                                        >
                                            Yes
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => setVal('OverTime', 'No')}
                                            className={`flex-1 py-2 rounded-lg font-bold transition-all ${formData.OverTime === 'No'
                                                ? 'bg-green-100 text-green-600 border border-green-200'
                                                : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                                }`}
                                        >
                                            No
                                        </button>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        Job Satisfaction (1-4)
                                    </label>
                                    <div className="flex gap-2">
                                        {[1, 2, 3, 4].map((n) => (
                                            <button
                                                type="button"
                                                key={n}
                                                onClick={() => setVal('JobSatisfaction', n)}
                                                className={`flex-1 py-2 rounded-lg font-bold transition-all ${parseInt(formData.JobSatisfaction, 10) === n
                                                    ? 'bg-blue-600 text-white shadow-md'
                                                    : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                                    }`}
                                            >
                                                {n}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        Env Satisfaction (1-4)
                                    </label>
                                    <div className="flex gap-2">
                                        {[1, 2, 3, 4].map((n) => (
                                            <button
                                                type="button"
                                                key={n}
                                                onClick={() => setVal('EnvironmentSatisfaction', n)}
                                                className={`flex-1 py-2 rounded-lg font-bold transition-all ${parseInt(formData.EnvironmentSatisfaction, 10) === n
                                                    ? 'bg-blue-600 text-white shadow-md'
                                                    : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                                    }`}
                                            >
                                                {n}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="md:col-span-2">
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        Monthly Income ($)
                                    </label>
                                    <div className="relative">
                                        <DollarSign
                                            size={16}
                                            className="absolute left-3 top-3.5 text-slate-400"
                                        />
                                        <input
                                            type="number"
                                            name="MonthlyIncome"
                                            value={formData.MonthlyIncome}
                                            onChange={handleChange}
                                            className="w-full p-3 pl-9 bg-slate-100 border-0 rounded-lg focus:ring-2 focus:ring-indigo-500 transition-all font-mono text-lg"
                                            min="0"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        Total Working Years
                                    </label>
                                    <input
                                        type="number"
                                        name="TotalWorkingYears"
                                        value={formData.TotalWorkingYears}
                                        onChange={handleChange}
                                        className="w-full p-3 bg-slate-100 border-0 rounded-lg"
                                        min="0"
                                    />
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">
                                        Years At Company
                                    </label>
                                    <input
                                        type="number"
                                        name="YearsAtCompany"
                                        value={formData.YearsAtCompany}
                                        onChange={handleChange}
                                        className="w-full p-3 bg-slate-100 border-0 rounded-lg"
                                        min="0"
                                    />
                                </div>
                            </div>

                            <button
                                type="button"
                                onClick={simulatePrediction}
                                disabled={loading}
                                className="w-full mt-8 bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-900 transition-all flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
                            >
                                {loading ? (
                                    'Calculating...'
                                ) : (
                                    <>
                                        <Calculator size={20} /> Calculate Attrition Probability
                                    </>
                                )}
                            </button>
                        </Card>

                        <div className="h-full">
                            {result ? (
                                <Card
                                    className={`h-full border-t-4 flex flex-col justify-center items-center ${result.prediction === 'Yes'
                                        ? 'border-t-red-500 bg-red-50/50'
                                        : 'border-t-green-500 bg-green-50/50'
                                        }`}
                                >
                                    <div
                                        className={`w-24 h-24 rounded-full flex items-center justify-center mb-6 ${result.prediction === 'Yes'
                                            ? 'bg-red-100 text-red-600'
                                            : 'bg-green-100 text-green-600'
                                            }`}
                                    >
                                        {result.prediction === 'Yes' ? (
                                            <AlertCircle size={48} />
                                        ) : (
                                            <CheckCircle size={48} />
                                        )}
                                    </div>
                                    <h2 className="text-xs font-bold uppercase tracking-widest text-slate-400">
                                        Prediction Result
                                    </h2>
                                    <div className="mt-2 text-6xl font-black text-slate-800">
                                        {result.probability}%
                                    </div>
                                    <p
                                        className={`font-bold mt-2 text-xl ${result.prediction === 'Yes'
                                            ? 'text-red-600'
                                            : 'text-green-600'
                                            }`}
                                    >
                                        {result.prediction === 'Yes'
                                            ? 'High Risk'
                                            : 'Likely to Stay'}
                                    </p>
                                    <div className="mt-8 w-full bg-white/60 p-4 rounded-lg border border-slate-200/50">
                                        <p className="text-xs font-bold text-slate-400 uppercase mb-2 flex items-center gap-2">
                                            <Activity size={14} /> Risk Factors
                                        </p>
                                        <ul className="space-y-2">
                                            {result.factors && result.factors.length > 0 ? (
                                                result.factors.map((f, i) => (
                                                    <li
                                                        key={i}
                                                        className="text-sm text-slate-600 flex items-center gap-2"
                                                    >
                                                        <div className="w-1.5 h-1.5 bg-red-500 rounded-full" />
                                                        {f}
                                                    </li>
                                                ))
                                            ) : (
                                                <li className="text-sm text-green-600">
                                                    No major risks detected.
                                                </li>
                                            )}
                                        </ul>
                                    </div>
                                </Card>
                            ) : (
                                <div className="h-full border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-300 p-8">
                                    <Building2 size={64} className="mb-4" />
                                    <p className="font-medium">Result will appear here</p>
                                    <p className="text-xs text-slate-400 mt-1 text-center">
                                        Fill the form on the left and click &quot;Calculate&quot; to
                                        see the prediction.
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Report Component ---
        const ReportView = ({ stats, uploadedData }) => {
            const problems = [];
            const solutions = [];

            // Narrative Generation (New)
            const generateNarrative = () => {
                const total = stats.totalEmployees || 0;
                const rate = stats.attritionRate || 0;
                let text = `Based on the analysis of ${total} employee records, the organization currently faces an overall attrition rate of ${rate}%. `;

                // Health Check
                if (rate > 15) text += "This is effectively high, indicating potential retention issues that need immediate strategic intervention. ";
                else if (rate > 10) text += "This is slightly above industry average, suggesting room for improvement in employee engagement. ";
                else text += "This indicates a healthy retention level, though specific pockets of risk may still exist. ";

                // Department
                const riskyDept = stats.deptData && stats.deptData[0];
                if (riskyDept && riskyDept.attrition > 15) {
                    text += `The ${riskyDept.name} department shows disproportionately high turnover (${riskyDept.attrition}%), serving as a primary driver for these figures. `;
                }

                // Age
                const youngRisk = stats.ageData && stats.ageData.find(a => a.name === '18-25' && a.attrition > 20);
                if (youngRisk) {
                    text += "Demographically, early-career employees (18-25) are leaving at an accelerated rate, pointing to potential gaps in onboarding or initial career development paths. ";
                }

                // OverTime
                const otRisk = stats.overTimeData && stats.overTimeData.find(d => d.name === 'Yes' && d.attrition > 20);
                if (otRisk) {
                    text += "Significantly, employees working OverTime are showing marked instability, strongly correlating burnout with exit decisions. ";
                }

                text += "Comprehensive data breakdown follows below.";
                return text;
            };

            const narrative = generateNarrative();
            // OverTime/Tenure Logic
            const highOt = stats.overTimeData && stats.overTimeData.find(d => d.name === 'Yes' && d.attrition > 20);
            if (highOt) {
                problems.push({ cat: 'Burnout', text: `OverTime Attrition: ${highOt.attrition}%` });
                solutions.push({ cat: 'Balance', text: 'Review workload distribution' });
            }

            // Analysis Logic
            if (stats.attritionRate > 15) {
                problems.push({ cat: 'Critical', text: `Overall Attrition ${stats.attritionRate}% (High)` });
                solutions.push({ cat: 'Strategy', text: 'Implement retention program' });
            }
            const highAttrDept = stats.deptData.find(d => d.attrition > 20);
            if (highAttrDept) {
                problems.push({ cat: 'Dept', text: `${highAttrDept.name} Attrition: ${highAttrDept.attrition}%` });
                solutions.push({ cat: 'Action', text: `Audit ${highAttrDept.name} workflows` });
            }
            const youngChurn = stats.ageData.find(a => a.name === '18-25' && a.attrition > 25);
            if (youngChurn) {
                problems.push({ cat: 'Age', text: 'High Risk in 18-25 Group' });
                solutions.push({ cat: 'Mentorship', text: 'Launch Early-Career Program' });
            }
            if (problems.length === 0) {
                problems.push({ cat: 'Good', text: 'Metrics are healthy.' });
                solutions.push({ cat: 'Maintain', text: 'Continue monitoring.' });
            }

            return (
                <div className="print-only font-sans text-slate-900">
                    {/* Header */}
                    <div className="flex justify-between items-center border-b-2 border-slate-800 pb-4 mb-6">
                        <h1 className="text-3xl font-black uppercase">Analytics Report</h1>
                        <div className="text-right">
                            <p className="text-sm font-bold text-slate-500">{new Date().toLocaleDateString()}</p>
                            <p className="text-xs text-slate-400 uppercase">AttritionAI Generated</p>
                        </div>
                    </div>

                    {/* Metrics Row */}
                    <div className="grid grid-cols-4 gap-4 mb-8">
                        <div className="p-4 bg-slate-50 border border-slate-200 rounded text-center">
                            <p className="text-xs font-bold text-slate-400 uppercase">Total Employees</p>
                            <p className="text-2xl font-black">{stats.totalEmployees}</p>
                        </div>
                        <div className="p-4 bg-slate-50 border border-slate-200 rounded text-center">
                            <p className="text-xs font-bold text-slate-400 uppercase">Attrition Rate</p>
                            <p className={`text-2xl font-black ${stats.attritionRate > 15 ? 'text-red-600' : 'text-green-600'}`}>{stats.attritionRate}%</p>
                        </div>
                        <div className="p-4 bg-slate-50 border border-slate-200 rounded text-center">
                            <p className="text-xs font-bold text-slate-400 uppercase">Risk Depts</p>
                            <p className="text-2xl font-black text-orange-500">{stats.deptData.length}</p>
                        </div>
                        <div className="p-4 bg-slate-50 border border-slate-200 rounded text-center">
                            <p className="text-xs font-bold text-slate-400 uppercase">Est. Cost</p>
                            <p className="text-2xl font-black">${(Math.round(stats.totalEmployees * (stats.attritionRate / 100) * 20000 / 1000))}k</p>
                        </div>
                    </div>

                    {/* Executive Summary (Detailed Narrative) */}
                    <div className="mb-8 p-6 bg-blue-50/50 border border-blue-100 rounded-lg">
                        <h3 className="text-sm font-bold uppercase text-blue-800 mb-2">Executive Summary</h3>
                        <p className="text-sm text-slate-700 leading-relaxed text-justify">
                            {narrative}
                        </p>
                    </div>

                    {/* Insights & Charts Grid */}
                    <div className="grid grid-cols-3 gap-6">
                        {/* Column 1: Insights & Dept Chart */}
                        <div className="space-y-8">
                            <div className="border border-slate-200 rounded p-4">
                                <h3 className="text-sm font-bold uppercase border-b border-slate-200 pb-2 mb-3">Key Risk Factors</h3>
                                <ul className="space-y-2">
                                    {problems.map((p, i) => (
                                        <li key={i} className="flex items-center gap-2 text-sm font-medium text-red-700">
                                            <span className="w-2 h-2 rounded-full bg-red-500"></span>
                                            {p.text}
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div className="print-chart">
                                <h3 className="text-xs font-bold uppercase mb-2 text-slate-400">Department Attrition</h3>
                                <div className="space-y-2">
                                    {stats.deptData.slice(0, 5).map(d => (
                                        <div key={d.name} className="flex items-center gap-2">
                                            <span className="w-20 text-[10px] font-bold text-right shrink-0 truncate">{d.name}</span>
                                            <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                <div className="h-full bg-slate-800" style={{ width: `${d.attrition}%` }}></div>
                                            </div>
                                            <span className="w-6 text-[10px] font-bold text-right">{d.attrition}%</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {stats.genderData && stats.genderData.length > 0 && (
                                <div className="print-chart">
                                    <h3 className="text-xs font-bold uppercase mb-2 text-slate-400">Gender Risk</h3>
                                    <div className="space-y-2">
                                        {stats.genderData.map(d => (
                                            <div key={d.name} className="flex items-center gap-2">
                                                <span className="w-20 text-[10px] font-bold text-right shrink-0 truncate">{d.name}</span>
                                                <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-purple-600" style={{ width: `${d.attrition}%` }}></div>
                                                </div>
                                                <span className="w-6 text-[10px] font-bold text-right">{d.attrition}%</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Column 2: Solutions & Age Chart */}
                        <div className="space-y-8">
                            <div className="border border-slate-200 rounded p-4">
                                <h3 className="text-sm font-bold uppercase border-b border-slate-200 pb-2 mb-3">Recommended Actions</h3>
                                <ul className="space-y-2">
                                    {solutions.map((s, i) => (
                                        <li key={i} className="flex items-center gap-2 text-sm font-medium text-blue-700">
                                            <span className="w-2 h-2 rounded-full bg-blue-500"></span>
                                            {s.text}
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div className="print-chart">
                                <h3 className="text-xs font-bold uppercase mb-2 text-slate-400">Age Group Risk</h3>
                                <div className="space-y-2">
                                    {stats.ageData.map(d => (
                                        <div key={d.name} className="flex items-center gap-2">
                                            <span className="w-20 text-[10px] font-bold text-right shrink-0">{d.name}</span>
                                            <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                <div className="h-full bg-orange-500" style={{ width: `${d.attrition}%` }}></div>
                                            </div>
                                            <span className="w-6 text-[10px] font-bold text-right">{d.attrition}%</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {stats.maritalData && stats.maritalData.length > 0 && (
                                <div className="print-chart">
                                    <h3 className="text-xs font-bold uppercase mb-2 text-slate-400">Marital Status</h3>
                                    <div className="space-y-2">
                                        {stats.maritalData.map(d => (
                                            <div key={d.name} className="flex items-center gap-2">
                                                <span className="w-20 text-[10px] font-bold text-right shrink-0 truncate">{d.name}</span>
                                                <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-pink-500" style={{ width: `${d.attrition}%` }}></div>
                                                </div>
                                                <span className="w-6 text-[10px] font-bold text-right">{d.attrition}%</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Column 3: Work Factors (New) */}
                        <div className="space-y-6">
                            <div className="border border-slate-200 rounded p-4 h-fit bg-slate-50">
                                <h3 className="text-sm font-bold uppercase border-b border-slate-200 pb-2 mb-3 text-slate-600">Work Factors</h3>
                                <div className="space-y-4">
                                    {/* OverTime */}
                                    {stats.overTimeData && stats.overTimeData.length > 0 && (
                                        <div>
                                            <h4 className="text-[10px] font-bold uppercase text-slate-400 mb-2">OverTime Impact</h4>
                                            <div className="space-y-2">
                                                {stats.overTimeData.map(d => (
                                                    <div key={d.name} className="flex items-center gap-2">
                                                        <span className="w-12 text-[10px] font-bold text-right shrink-0">{d.name}</span>
                                                        <div className="flex-1 h-2 bg-slate-200 rounded-full overflow-hidden">
                                                            <div className={`h-full ${d.name === 'Yes' ? 'bg-red-600' : 'bg-green-600'}`} style={{ width: `${d.attrition}%` }}></div>
                                                        </div>
                                                        <span className="w-8 text-[10px] font-bold text-right">{d.attrition}%</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Tenure */}
                                    {stats.tenureData && stats.tenureData.length > 0 && (
                                        <div>
                                            <h4 className="text-[10px] font-bold uppercase text-slate-400 mb-2">Tenure Risk</h4>
                                            <div className="space-y-2">
                                                {stats.tenureData.map(d => (
                                                    <div key={d.name} className="flex items-center gap-2">
                                                        <span className="w-16 text-[10px] font-bold text-right shrink-0">{d.name}</span>
                                                        <div className="flex-1 h-2 bg-slate-200 rounded-full overflow-hidden">
                                                            <div className="h-full bg-indigo-600" style={{ width: `${d.attrition}%` }}></div>
                                                        </div>
                                                        <span className="w-8 text-[10px] font-bold text-right">{d.attrition}%</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Navigation = ({ activeTab, setActiveTab }) => (
            <aside className="w-64 bg-slate-900 text-white min-h-screen flex flex-col fixed left-0 top-0 z-50">
                <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                    <div className="bg-blue-600 p-2 rounded-lg">
                        <Activity size={24} />
                    </div>
                    <div>
                        <h1 className="font-bold text-lg">
                            Attrition<span className="text-blue-400">AI</span>
                        </h1>
                        <p className="text-[10px] text-slate-400 uppercase">
                            by Samidha Lahane
                        </p>
                    </div>
                </div>
                <nav className="flex-1 p-4 space-y-2 mt-4">
                    <button
                        type="button"
                        onClick={() => setActiveTab('dashboard')}
                        className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm ${activeTab === 'dashboard'
                            ? 'bg-blue-600 shadow-lg'
                            : 'hover:bg-slate-800 text-slate-400'
                            }`}
                    >
                        <LayoutDashboard size={20} />
                        Dashboard
                    </button>
                    <button
                        type="button"
                        onClick={() => setActiveTab('predict')}
                        className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-sm ${activeTab === 'predict'
                            ? 'bg-blue-600 shadow-lg'
                            : 'hover:bg-slate-800 text-slate-400'
                            }`}
                    >
                        <Calculator size={20} />
                        Prediction Tool
                    </button>
                </nav>
                <div className="p-4 text-[10px] text-slate-500 border-t border-slate-800">
                    <p>HR Analytics • Attrition Predictor</p>
                </div>
            </aside>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            // Dashboard State Lifted
            const [stats, setStats] = useState(defaultStats);
            const [fileName, setFileName] = useState('Default Dataset');
            const [showModal, setShowModal] = useState(false);
            const [modalContent, setModalContent] = useState('requirements');
            const [errorMsg, setErrorMsg] = useState('');
            const [uploadedData, setUploadedData] = useState([]);
            const [isPredicting, setIsPredicting] = useState(false);

            return (
                <div className="flex min-h-screen">
                    <ReportView stats={stats} uploadedData={uploadedData} />
                    <Navigation activeTab={activeTab} setActiveTab={setActiveTab} />
                    <main className="flex-1 w-full bg-slate-50">
                        {activeTab === 'dashboard' ? (
                            <DashboardView
                                stats={stats} setStats={setStats}
                                fileName={fileName} setFileName={setFileName}
                                showModal={showModal} setShowModal={setShowModal}
                                modalContent={modalContent} setModalContent={setModalContent}
                                errorMsg={errorMsg} setErrorMsg={setErrorMsg}
                                uploadedData={uploadedData} setUploadedData={setUploadedData}
                                isPredicting={isPredicting} setIsPredicting={setIsPredicting}
                            />
                        ) : (
                            <PredictView uploadedData={uploadedData} />
                        )}
                    </main>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
