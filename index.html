                <line x1="12" x2="12" y1="15" y2="3" />
            </Icon>
        );

        // --- Data Logic ---
        const defaultStats = {
            totalEmployees: 1470,
            attritionRate: 16.1,
            avgIncome: 6503,
            avgAge: 36.9,
            incomeGap: 0,
            deptData: [
                { name: 'R&D', attrition: 13.8 },
                { name: 'Sales', attrition: 20.6 },
                { name: 'HR', attrition: 19.0 },
            ],
            satisfactionData: [
                { name: 'Low', value: 289, color: '#EF4444' },
                { name: 'Medium', value: 280, color: '#F59E0B' },
                { name: 'High', value: 442, color: '#10B981' },
                { name: 'Very High', value: 459, color: '#3B82F6' },
            ],
            ageData: [
                { name: '18-25', attrition: 35 },
                { name: '26-35', attrition: 20 },
                { name: '36-45', attrition: 12 },
                { name: '46-60', attrition: 8 },
            ],
            educationData: [],
            genderData: [],
            maritalData: [],
            suggestions: [
                {
                    type: 'critical',
                    text: 'High turnover rate in Sales (20.6%). Consider reviewing incentive structures.',
                },
                {
                    type: 'warning',
                    text: 'Employees aged 18-25 have the highest attrition. Focus on early-career mentorship.',
                },
            ],
            columnMapping: {},
            lastUpdated: null,
        };

        const parseCSV = (text) => {
            if (!text) return [];
            // Handle possible BOM and normalize line endings
            const cleaned = text.replace(/^\uFEFF/, '');
            const lines = cleaned
                .split(/\r\n|\n/)
                .map((l) => l.trim())
                .filter(Boolean);

            if (lines.length === 0) return [];

            // Robust CSV Line Parser (handles quoted values)
            const parseLine = (line) => {
                const values = [];
                let current = '';
                let inQuote = false;

                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuote = !inQuote;
                    } else if (char === ',' && !inQuote) {
                        values.push(current.trim().replace(/^"|"$/g, '').trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }

                values.push(current.trim().replace(/^"|"$/g, '').trim());
                return values;
            };

            const headers = parseLine(lines[0]);
            return lines.slice(1).map((line) => {
                const values = parseLine(line);
                const obj = {};
                headers.forEach((h, i) => {
                    if (h) obj[h] = values[i] || '';
                });
                return obj;
            });
        };

        // SMART MAPPING
        const COLUMN_SYNONYMS = {
            Attrition: ['Attrition', 'Churn', 'Left', 'Status', 'Terminated', 'EmploymentStatus', 'Exited'],
            Department: ['Department', 'Job Role', 'JobRole', 'Business Unit', 'Function', 'Role'],
            MonthlyIncome: ['MonthlyIncome', 'Income', 'Salary', 'Pay', 'Wage', 'Gross Salary'],
            Age: ['Age', 'YearsOld', 'DOB', 'Date of Birth'],
            JobSatisfaction: ['JobSatisfaction', 'Satisfaction', 'Happiness', 'Work-Life Balance', 'Employee Satisfaction'],
            Education: ['Education', 'EducationField', 'Degree', 'Qualification'],
            Gender: ['Gender', 'Sex'],
            MaritalStatus: ['MaritalStatus', 'Marital', 'Civil Status'],
        };

        const findKey = (obj, cat) => {
            if (!obj) return null;
            const keys = Object.keys(obj);
            // 1. Exact match
            let match = keys.find((k) => k.toLowerCase() === cat.toLowerCase());
            if (match) return match;
            // 2. Synonym match
            return keys.find((k) =>
                (COLUMN_SYNONYMS[cat] || []).some(
                    (s) =>
                        k
                            .toLowerCase()
                            .replace(/[^a-z0-9]/g, '') ===
                        s
                            .toLowerCase()
                            .replace(/[^a-z0-9]/g, '')
                )
            );
        };

        const downloadCSV = (data, filename = 'analysis_report.csv') => {
            if (!data || !data.length) return;

            const headers = Object.keys(data[0]);
            const headerRow = headers.join(',');

            const rows = data.map(row => {
                return headers.map(header => {
                    let val = row[header] === null || row[header] === undefined ? '' : row[header];
                    val = val.toString().replace(/"/g, '""'); // Escape double quotes
                    if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                        val = `"${val}"`; // Wrap in quotes if needed
                    }
                    return val;
                }).join(',');
            });

            const csvContent = [headerRow, ...rows].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        const calculateAnalytics = (data) => {
            const total = data.length;
            if (total === 0) return { ...defaultStats, lastUpdated: null };

            const k = {
                att: findKey(data[0], 'Attrition'),
                inc: findKey(data[0], 'MonthlyIncome'),
                age: findKey(data[0], 'Age'),
                dept: findKey(data[0], 'Department'),
                sat: findKey(data[0], 'JobSatisfaction'),
                edu: findKey(data[0], 'Education'),
                gen: findKey(data[0], 'Gender'),
                mar: findKey(data[0], 'MaritalStatus'),
                ot: findKey(data[0], 'OverTime'),
                ten: findKey(data[0], 'YearsAtCompany'),
            };

            let attCount = 0,
                totalInc = 0,
                totalAge = 0,
                incStay = 0,
                incLeft = 0,
                cStay = 0,
                cLeft = 0;

            const depts = {};
            const ageB = {
                '18-25': { t: 0, a: 0 },
                '26-35': { t: 0, a: 0 },
                '36-45': { t: 0, a: 0 },
                '46+': { t: 0, a: 0 },
            };
            const eduS = {};
            const genS = {};
            const marS = {};
            const otS = {};
            const tenB = { '0-2 Years': { t: 0, a: 0 }, '3-5 Years': { t: 0, a: 0 }, '6-10 Years': { t: 0, a: 0 }, '10+ Years': { t: 0, a: 0 } };
            const satC = { Low: 0, Medium: 0, High: 0, 'Very High': 0 };

            const attritionKeywords = ['yes', '1', 'true', 'left', 'terminated', 'quit', 'exited'];

            data.forEach((d) => {
                let left = false;

                if (k.att) {
                    const val = d[k.att];
                    if (val !== undefined && val !== null) {
                        const v = val.toString().toLowerCase().trim();
                        if (attritionKeywords.includes(v)) {
                            left = true;
                            attCount++;
                        }
                    }
                }

                if (k.inc) {
                    let v = d[k.inc];
                    if (v !== undefined && v !== null) {
                        v = parseFloat(v.toString().replace(/[$,k]/g, '').trim()) || 0;
                        if (v > 0) {
                            totalInc += v;
                            if (left) {
                                incLeft += v;
                                cLeft++;
                            } else {
                                incStay += v;
                                cStay++;
                            }
                        }
                    }
                }

                if (k.age) {
                    const rawAge = d[k.age];
                    let v = parseFloat(rawAge);
                    if (!isNaN(v)) {
                        totalAge += v;
                        let b = '46+';
                        if (v <= 25) b = '18-25';
                        else if (v <= 35) b = '26-35';
                        else if (v <= 45) b = '36-45';

                        if (!ageB[b]) ageB[b] = { t: 0, a: 0 };
                        ageB[b].t++;
                        if (left) ageB[b].a++;
                    }
                }

                const dept = k.dept ? (d[k.dept] || 'Unknown').toString().trim() : 'All';
                if (!depts[dept]) depts[dept] = { t: 0, a: 0 };
                depts[dept].t++;
                if (left) depts[dept].a++;

                if (k.edu) {
                    const v = (d[k.edu] || 'Unknown').toString().trim();
                    if (!eduS[v]) eduS[v] = { t: 0, a: 0 };
                    eduS[v].t++;
                    if (left) eduS[v].a++;
                }

                if (k.gen) {
                    const v = (d[k.gen] || 'Unknown').toString().trim();
                    if (!genS[v]) genS[v] = { t: 0, a: 0 };
                    genS[v].t++;
                    if (left) genS[v].a++;
                }

                if (k.mar) {
                    const v = (d[k.mar] || 'Unknown').toString().trim();
                    if (!marS[v]) marS[v] = { t: 0, a: 0 };
                    marS[v].t++;
                    if (left) marS[v].a++;
                }

                if (k.sat && d[k.sat] !== undefined && d[k.sat] !== null) {
                    let level = 'Medium';
                    const val = d[k.sat].toString().toLowerCase();
                    const n = parseInt(val, 10);

                    if (!isNaN(n)) {
                        if (n <= 1) level = 'Low';
                        else if (n === 2) level = 'Medium';
                        else if (n === 3) level = 'High';
                        else level = 'Very High';
                    } else {
                        if (val.includes('low') || val.includes('poor') || val.includes('bad')) level = 'Low';
                        else if (val.includes('very') || val.includes('excellent')) level = 'Very High';
                        else if (val.includes('high') || val.includes('good')) level = 'High';
                    }
                    satC[level]++;
                }

                if (k.ot) {
                    const v = (d[k.ot] || 'Unknown').toString().trim();
                    if (!otS[v]) otS[v] = { t: 0, a: 0 };
                    otS[v].t++;
                    if (left) otS[v].a++;
                }

                if (k.ten) {
                    const v = parseFloat(d[k.ten]);
                    if (!isNaN(v)) {
                        let b = '10+ Years';
                        if (v <= 2) b = '0-2 Years';
                        else if (v <= 5) b = '3-5 Years';
                        else if (v <= 10) b = '6-10 Years';

                        if (!tenB[b]) tenB[b] = { t: 0, a: 0 };
                        tenB[b].t++;
                        if (left) tenB[b].a++;
                    }
                }
            });

            const fmt = (obj, lim = 8) =>
                Object.keys(obj)
                    .map((n) => ({
                        name: n,
                        attrition: obj[n].t
                            ? parseFloat(((obj[n].a / obj[n].t) * 100).toFixed(1))
                            : 0,
                    }))
                    .sort((a, b) => b.attrition - a.attrition)
                    .slice(0, lim);

            const rate = total > 0 ? parseFloat(((attCount / total) * 100).toFixed(1)) : 0;
            const gap =
                k.inc && cStay > 0 && cLeft > 0
                    ? Math.round(incStay / cStay) - Math.round(incLeft / cLeft)
                    : null;

            const sugg = [];
            if (rate > 20) sugg.push({ type: 'critical', text: `Critical: Attrition is ${rate}%, very high.` });
            else if (rate > 15) sugg.push({ type: 'warning', text: `Attrition is ${rate}%, above average.` });
            else sugg.push({ type: 'success', text: `Attrition is healthy at ${rate}%.` });

            const deptArr = fmt(depts);
            if (deptArr.length > 0 && deptArr[0].attrition > 20) {
                sugg.push({
                    type: 'action',
                    text: `Investigate ${deptArr[0].name} dept (${deptArr[0].attrition}% leaving).`,
                });
            }

            if (gap && gap > 1000) {
                sugg.push({ type: 'info', text: 'Pay Gap: Leavers earn significantly less.' });
            }

            if (ageB['18-25'] && ageB['18-25'].t > 0 && ageB['18-25'].a / ageB['18-25'].t > 0.25) {
                sugg.push({
                    type: 'info',
                    text: 'High turnover in under-25s. Improve onboarding.',
                });
            }

            return {
                totalEmployees: total,
                attritionRate: rate,
                avgIncome: k.inc ? Math.round(totalInc / total) : 'N/A',
                avgAge: k.age ? (totalAge / total).toFixed(1) : 'N/A',
                incomeGap: gap,
                deptData: deptArr,
                ageData: k.age
                    ? Object.keys(ageB).map((n) => ({
                        name: n,
                        attrition: ageB[n].t
                            ? parseFloat(((ageB[n].a / ageB[n].t) * 100).toFixed(1))
                            : 0,
                    }))
                    : [],
                educationData: k.edu ? fmt(eduS) : [],
                genderData: k.gen ? fmt(genS) : [],
                maritalData: k.mar ? fmt(marS) : [],
                overTimeData: k.ot ? fmt(otS) : [],
                tenureData: k.ten ? Object.keys(tenB).map(n => ({
                    name: n,
                    attrition: tenB[n].t ? parseFloat(((tenB[n].a / tenB[n].t) * 100).toFixed(1)) : 0
                })) : [],
                satisfactionData: k.sat
                    ? [
                        { name: 'Low', value: satC['Low'], color: '#EF4444' },
                        { name: 'Medium', value: satC['Medium'], color: '#F59E0B' },
                        { name: 'High', value: satC['High'], color: '#10B981' },
                        { name: 'Very High', value: satC['Very High'], color: '#3B82F6' },
                    ].filter((d) => d.value > 0)
                    : [],
                suggestions: sugg,
                columnMapping: k,
                lastUpdated: Date.now(),
            };
        };

        const Card = ({ children, className = '' }) => (
            <div
                className={`glass-panel rounded-xl shadow-sm border border-slate-100 p-6 ${className}`}
            >
                {children}
            </div>
        );

        const StatCard = ({ title, value, icon: IconComp, color }) => (
            <Card>
                <div className="flex justify-between items-center">
                    <div>
                        <p className="text-sm text-slate-500 font-medium">{title}</p>
                        <h3 className="text-2xl font-bold text-slate-800 mt-1">{value}</h3>
                    </div>
                    <div className={`p-3 rounded-xl ${color} bg-opacity-10`}>
                        <IconComp size={24} className={color.replace('bg-', 'text-')} />
                    </div>
                </div>
            </Card>
        );

        const SuggestionPanel = ({ suggestions }) => (
            <div className="bg-gradient-to-r from-indigo-50 to-blue-50 border border-indigo-100 rounded-xl p-6 mb-8">
                <div className="flex items-center gap-3 mb-4">
                    <div className="bg-white p-2 rounded-lg text-indigo-600">
                        <Lightbulb size={20} />
                    </div>
                    <h3 className="font-bold text-indigo-900">AI Recommendations</h3>
                </div>
                <div className="grid gap-3">
                    {suggestions.map((s, i) => (
                        <div
                            key={i}
                            className="flex gap-3 bg-white/60 p-3 rounded-lg border border-indigo-50"
                        >
                            <div
                                className={`mt-1 w-2 h-2 rounded-full shrink-0 ${s.type === 'critical'
                                    ? 'bg-red-500'
                                    : s.type === 'warning'
                                        ? 'bg-orange-500'
                                        : s.type === 'success'
                                            ? 'bg-green-500'
                                            : 'bg-blue-500'
                                    }`}
                            />
                            <p className="text-sm text-indigo-800">{s.text}</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const DashboardView = ({
            stats, setStats,
            fileName, setFileName,
            showModal, setShowModal,
            modalContent, setModalContent,
            errorMsg, setErrorMsg,
            uploadedData, setUploadedData,
            isPredicting, setIsPredicting
        }) => {
            const fileRef = useRef(null);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setFileName(file.name);
                setErrorMsg('');

                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const parsed = parseCSV(ev.target.result);

                        if (!parsed.length) {
                            setStats(defaultStats);
                            setErrorMsg('Uploaded CSV seems empty or invalid. Showing default demo data.');
                            return;
                        }


                        setUploadedData(parsed);

                        if (!findKey(parsed[0], 'Attrition')) {
                            // Enable Batch Prediction Flow
                            setModalContent('predict_confirm');
                            setShowModal(true);
                            return;
                        }

                        setStats(calculateAnalytics(parsed));
                    } catch (err) {
                        console.error('Error parsing CSV', err);
                        setStats(defaultStats);
                        setErrorMsg('Error parsing CSV file. Reverted to default demo data.');
                    }
                };
                reader.readAsText(file);
            };

            const runBatchPrediction = async () => {
                if (!uploadedData.length) return;
                setIsPredicting(true);
                setErrorMsg('');

                try {
                    const response = await fetch('http://127.0.0.1:5000/batch_predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ employees: uploadedData }),
                    });

                    if (!response.ok) throw new Error('Prediction API failed');

                    const apiRes = await response.json();

                    // Merge predictions back into data
                    const mergedData = uploadedData.map((row, i) => {
                        const pred = apiRes.predictions[i];
                        return {
                            ...row,
                            Attrition: pred ? pred.Attrition : 'No',
                            PredictionProbability: pred ? pred.Probability : 0
                        };
                    });

                    setStats(calculateAnalytics(mergedData));
                    setUploadedData(mergedData); // Update shared data
                    setShowModal(false);
                    setErrorMsg('✅ AI Prediction Complete. Showing predicted risks.');
                } catch (err) {
                    console.error(err);
                    setErrorMsg('Failed to run batch prediction. Is the backend running?');
                    // Fallback to showing data without attrition
                    setStats(calculateAnalytics(uploadedData));
                    setShowModal(false);
                } finally {
                    setIsPredicting(false);
                }
            };

            const reset = () => {
                setStats(defaultStats);
                setFileName('Default Dataset');
                setErrorMsg('');
                setUploadedData([]);
                if (fileRef.current) fileRef.current.value = '';
            };

            const formattedLastUpdated =
                stats.lastUpdated &&
                new Date(stats.lastUpdated).toLocaleString(undefined, {
                    dateStyle: 'medium',
                    timeStyle: 'short',
                });

            return (
                <div className="ml-0 md:ml-64 p-6 md:p-8 space-y-6 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">
                                HR Analytics Overview
                            </h2>
                            <div className="flex flex-wrap items-center gap-3 mt-2 text-xs md:text-sm">
                                <p className="text-slate-500 flex items-center gap-2">
                                    <FileText size={14} /> Source: {fileName}
                                </p>
                                {formattedLastUpdated && (
                                    <span className="px-2 py-1 rounded-full bg-slate-100 text-slate-500">
                                        Last updated: {formattedLastUpdated}
                                    </span>
                                )}
                            </div>
                        </div>
                        <div className="flex flex-wrap gap-3">
                            <input
                                type="file"
                                ref={fileRef}
                                onChange={handleFile}
                                accept=".csv,text/csv"
                                className="hidden"
                            />

                            {fileName !== 'Default Dataset' && (
                                <>
                                    <button
                                        type="button"
                                        onClick={() => downloadCSV(uploadedData, `Attrition_Report_${new Date().toISOString().slice(0, 10)}.csv`)}
                                        className="flex items-center gap-2 px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-all shadow-sm"
                                    >
                                        <Download size={16} /> Download CSV
                                    </button>
                                    <button
                                        type="button"
                                        onClick={() => window.print()}
                                        className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-all shadow-sm"
                                    >
                                        <FileText size={16} /> Smart Report
                                    </button>
                                    <button
                                        type="button"
                                        onClick={reset}
                                        className="flex items-center gap-2 bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-red-100"
                                    >
                                        <Trash2 size={16} />
                                        Remove File
                                    </button>
                                </>
                            )}
                            <button
                                type="button"
                                onClick={() => {
                                    setModalContent('requirements');
                                    setShowModal(true);
                                }}
                                className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700"
                            >
                                <UploadCloud size={16} />
                                Upload CSV
                            </button>
                        </div>
                    </div>

                    {errorMsg && (
                        <div className="flex items-start gap-3 bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-lg text-sm">
                            <AlertTriangle size={18} className="mt-0.5" />
                            <span>{errorMsg}</span>
                        </div>
                    )}

                    {showModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 modal-enter backdrop-blur-sm">
                            <div className="bg-white rounded-xl p-6 max-w-md w-full shadow-2xl">
                                {modalContent === 'requirements' ? (
                                    <>
                                        <div className="flex items-center gap-3 text-amber-600 mb-4">
                                            <AlertTriangle size={24} />
                                            <h3 className="font-bold text-slate-800">Dataset Requirements</h3>
                                        </div>
                                        <p className="text-slate-600 text-sm mb-4">
                                            For best results, upload a clean CSV with these columns (or close
                                            synonyms):
                                        </p>
                                        <div className="bg-slate-50 p-4 rounded-lg border mb-6">
                                            <ul className="grid grid-cols-2 gap-2 list-disc list-inside text-sm text-slate-500">
                                                <li>Attrition / Status</li>
                                                <li>Department / Role</li>
                                                <li>Monthly Income</li>
                                                <li>Age</li>
                                                <li>Education</li>
                                                <li>Gender</li>
                                                <li>Marital Status</li>
                                                <li>Job Satisfaction</li>
                                            </ul>
                                        </div>
                                        <p className="text-xs text-slate-400 mb-6 italic">
                                            * The system is smart enough to handle synonyms (e.g. &quot;Pay&quot;
                                            instead of &quot;Income&quot;).
                                        </p>
                                        <div className="flex justify-end gap-3">
                                            <button
                                                type="button"
                                                onClick={() => setShowModal(false)}
                                                className="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm font-medium"
                                            >

                                            </button>
                                            <button
                                                type="button"
                                                onClick={() => {

                                            >
                                                Select File

                                    </>

                                    <>

                                            <Lightbulb size={24} />
                                            <h3 className="font-bold text-slate-800">Use AI Prediction?</h3>
                                        </div>
                                        <p className="text-slate-600 text-sm mb-4">
                                            We couldn't find an <strong>Attrition</strong> column in your file.
                                        </p>
                                        <p className="text-slate-600 text-sm mb-6">
                                            Would you like to use our AI model to <strong>predict attrition risk</strong> for these employees?
                                        </p>
                                        <div className="flex justify-end gap-3">
                                            <button
                                                type="button"
                                                disabled={isPredicting}
                                                onClick={() => {

                                                disabled={isPredicting}

                                                className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 flex items-center gap-2"
                                            >
                                                {isPredicting ? 'Running...' : 'Yes, Run Prediction'}
                                                {isPredicting && <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" />}
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    <SuggestionPanel suggestions={stats.suggestions} />

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard

                            value={stats.totalEmployees.toLocaleString()}
                            icon={Users}
                            color="bg-blue-500"
                        />
                        <StatCard
                            title="Overall Attrition"
                            value={`${stats.attritionRate}%`}
                            icon={UserMinus}
                            color="bg-red-500"
                        />
                        <StatCard
                            title="Avg Income"
                            value={
                                stats.avgIncome !== 'N/A'
                                    ? `$${stats.avgIncome.toLocaleString()}`
